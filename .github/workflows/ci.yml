name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    # Runs first and cheap. Catches committed API keys, DB passwords,
    # private keys before they ever get a CI run that could leak them
    # via logs. gitleaks-action uses the embedded .gitleaks.toml or
    # its defaults — extend with a custom config if you hit false
    # positives on test fixtures.
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Pest tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: secrets-scan

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, pgsql]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: panacea_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite, pdo_pgsql, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer audit (CVE check)
        # Fails the build on any known-vulnerable dependency. Bump
        # affected packages or pin a known-safe version when this
        # fires — don't downgrade to ignore.
        run: composer audit --no-dev --abandoned=ignore

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Pest tests
        env:
          DB_CONNECTION: ${{ matrix.db == 'pgsql' && 'pgsql' || 'sqlite' }}
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ matrix.db == 'pgsql' && 'panacea_test' || ':memory:' }}
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan test

      - name: OpenAPI spec drift check
        if: matrix.db == 'sqlite'
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          php artisan scramble:export --path=openapi.json --silent
          git diff --exit-code openapi.json \
            || (echo "::error::openapi.json is out of sync with the controllers. Regenerate locally: php artisan scramble:export --path=openapi.json --silent" && exit 1)
