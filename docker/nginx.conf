worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # stdout/stderr logging plays nicely with `fly logs` and `docker logs`.
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Generous body limit — anamnesis PDFs and the deep-health endpoint
    # both pass JSON payloads larger than the nginx default of 1 MB.
    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Send everything that isn't a real file through Laravel's front controller.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # SSE streaming endpoints (chat) need buffering off so tokens
            # reach the client as they arrive. Buffer off everywhere is
            # safe — the overhead is negligible for non-stream responses.
            fastcgi_buffering off;
            fastcgi_read_timeout 300s;
        }

        # Don't serve dotfiles (.env, .git) even if someone slips one in.
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
