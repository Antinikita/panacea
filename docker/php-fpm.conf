; Overrides the alpine base's www.conf for the runtime container.
; pm=ondemand keeps idle memory low — the Fly free VM has 1 GB and we
; share it with nginx/queue/scheduler.

[www]
listen = 127.0.0.1:9000

; Explicit pool user. The php:8.2-fpm-alpine base image defaults to
; www-data but supervisord starts php-fpm under root, and on some
; versions the pool inherits root unless we pin it. Files written by
; the worker (compiled Blade views in storage/framework/views/) must
; be owned by the same user the entrypoint chowns to.
user = www-data
group = www-data

pm = ondemand
pm.max_children = 10
pm.process_idle_timeout = 30s
pm.max_requests = 500

; Bail out of stuck requests before they tie up workers.
request_terminate_timeout = 60s

; Surface PHP errors via supervisord/docker logs.
catch_workers_output = yes
decorate_workers_output = no
